name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: '11.4.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run test

  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -e "./sidecar[dev,pix2text,claude,openai,genai]"
        timeout-minutes: 15
      - run: pytest

  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev libpipewire-0.3-dev libdbus-1-dev libgbm-dev
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create dummy sidecar binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/formulasnap-sidecar-aarch64-apple-darwin
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-apple-darwin
      - name: Create dummy sidecar binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-pc-windows-msvc.exe
      - name: Run tests
        if: runner.os != 'Windows'
        run: cargo test --lib
        working-directory: src-tauri
      # TODO: Windows 测试二进制因缺少 ComCtl32 v6 清单无法运行 (STATUS_ENTRYPOINT_NOT_FOUND)
      # 当前测试都是平台无关的纯逻辑测试，编译验证已足够。长期应考虑创建独立测试 crate 或嵌入 manifest。
      - name: Compile tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --lib --no-run
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflow files
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            rhysd/actionlint:latest -color
