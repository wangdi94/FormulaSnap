name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: '11.4.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run test

  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -e "./sidecar[dev,pix2text,claude,openai,genai]"
        timeout-minutes: 15
      - run: pytest

  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev libpipewire-0.3-dev libdbus-1-dev libgbm-dev
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create dummy sidecar binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/formulasnap-sidecar-aarch64-apple-darwin
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-apple-darwin
      - name: Create dummy sidecar binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/formulasnap-sidecar-x86_64-pc-windows-msvc.exe
      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Run tests
        run: cargo test --lib
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflow files
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            rhysd/actionlint:latest -color
      - name: Verify gh CLI availability
        run: |
          echo "::group::Verify gh CLI"
          gh --version
          echo "::endgroup::"

  build-verification:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ---- Python sidecar (PyInstaller) ----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install sidecar dependencies
        run: pip install "./sidecar[pix2text,claude,openai,genai]" pyinstaller appdirs

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: sidecar
        run: ./build.sh

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: sidecar
        shell: cmd
        run: .\build.bat

      # ---- Frontend ----
      - uses: pnpm/action-setup@v2
        with:
          version: '11.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm run build

      # ---- Rust / Tauri build verification ----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri build verification
        run: pnpm tauri build --target ${{ matrix.rust_target }}
