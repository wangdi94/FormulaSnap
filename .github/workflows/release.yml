name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel # Intel (x86_64)
            rust_target: x86_64-apple-darwin
          - os: macos-latest # Apple Silicon (aarch64)
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ---- Python sidecar (PyInstaller) ----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install sidecar dependencies
        run: pip install "./sidecar[pix2text,claude,openai,genai]" pyinstaller

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: sidecar
        run: ./build.sh

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: sidecar
        shell: cmd
        run: .\build.bat

      # ---- Frontend ----
      - uses: pnpm/action-setup@v2
        with:
          version: '11.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm run build

      # ---- Rust / Tauri ----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FormulaSnap ${{ github.ref_name }}'
          releaseBody: |
            ## FormulaSnap ${{ github.ref_name }}

            ### Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Intel (x86_64) | `.dmg` |
            | macOS | Apple Silicon (aarch64) | `.dmg` |
            | Windows | x86_64 | `.msi` / `.exe` |

            > Auto-update is enabled. Future releases will be delivered in-app.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}

      # ---- Build artifact size verification ----
      - name: Verify build artifact sizes
        shell: bash
        run: |
          echo "========================================="
          echo "  Build Artifact Size Verification"
          echo "========================================="

          # Thresholds (in MB)
          EXE_LIMIT=250
          DMG_LIMIT=220

          FAILED=false

          # --- Sidecar binary ---
          echo ""
          echo "--- Sidecar Binary ---"
          while IFS= read -r f; do
            SIZE=$(ls -lh "$f" | awk '{print $5}')
            echo "  $f: $SIZE"
          done < <(find src-tauri/binaries -name "formulasnap-sidecar-*" -type f 2>/dev/null)

          # --- Installer packages ---
          echo ""
          echo "--- Installer Packages ---"

          # Check .exe (NSIS installer)
          while IFS= read -r f; do
            SIZE_MB=$(du -m "$f" | cut -f1)
            echo "  $f: ${SIZE_MB}MB"
            if [ "$SIZE_MB" -ge "$EXE_LIMIT" ]; then
              echo "  ❌ FAIL: exceeds ${EXE_LIMIT}MB limit"
              FAILED=true
            fi
          done < <(find src-tauri/target/*/release/bundle -name "*.exe" -type f 2>/dev/null)

          # Check .dmg
          while IFS= read -r f; do
            SIZE_MB=$(du -m "$f" | cut -f1)
            echo "  $f: ${SIZE_MB}MB"
            if [ "$SIZE_MB" -ge "$DMG_LIMIT" ]; then
              echo "  ❌ FAIL: exceeds ${DMG_LIMIT}MB limit"
              FAILED=true
            fi
          done < <(find src-tauri/target/*/release/bundle -name "*.dmg" -type f 2>/dev/null)

          # Report .msi (informational)
          while IFS= read -r f; do
            SIZE_MB=$(du -m "$f" | cut -f1)
            echo "  $f: ${SIZE_MB}MB"
          done < <(find src-tauri/target/*/release/bundle -name "*.msi" -type f 2>/dev/null)

          echo ""
          if [ "$FAILED" = true ]; then
            echo "❌ Build artifact size verification FAILED"
            exit 1
          fi
          echo "✅ All build artifact sizes within limits"
