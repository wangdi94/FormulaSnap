<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormulaSnap</title>
    <style>
      /* 应急样式：JS 加载/执行失败时仍可见 */
      html, body { margin: 0; padding: 0; height: 100%; }
      body { background: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #root { min-height: 100%; background: #000000; }
      #loading-fallback {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; padding: 2rem; text-align: center;
      }
      #loading-fallback .spinner {
        width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #3b82f6;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading-fallback p { margin-top: 1rem; color: #6b7280; font-size: 14px; }
      #js-error {
        display: none; margin-top: 1rem; padding: 1rem;
        background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
        color: #991b1b; font-size: 13px; text-align: left; max-width: 480px;
        word-break: break-word;
      }
      #js-error.visible { display: block; }
      #js-error h3 { margin: 0 0 0.5rem; font-size: 14px; }
      #js-error pre { margin: 0; white-space: pre-wrap; font-family: monospace; }
      .hidden-init { display: none !important; }
    </style>
    <script>
      // 在 React 挂载前捕获全局 JS 错误
      window.__JS_ERRORS__ = [];
      window.onerror = function(msg, url, line, col, err) {
        var text = (err && err.stack) || msg;
        if (typeof text === 'string') text = text.substring(0, 1000);
        window.__JS_ERRORS__.push(text);
        showJSError(text);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var text = (e.reason && (e.reason.stack || e.reason.message || String(e.reason))) || 'Unhandled Promise rejection';
        if (typeof text === 'string') text = text.substring(0, 1000);
        window.__JS_ERRORS__.push(text);
        showJSError(text);
      });
      function showJSError(msg) {
        var el = document.getElementById('js-error');
        if (!el) return;
        el.classList.add('visible');
        var pre = el.querySelector('pre');
        if (pre) pre.textContent += (pre.textContent ? '\n---\n' : '') + msg;
      }
      // React 挂载后自然替换 #root 内容，fallback 自动消失。
      // 如果 React 没挂载，fallback 保持可见，JS 错误也显示在页面上。
      // 由 main.tsx 或 React 组件在首次渲染后显式隐藏 fallback：
    </script>
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback">
        <div class="spinner"></div>
        <p>正在加载 FormulaSnap…</p>
        <div id="js-error">
          <h3>脚本错误</h3>
          <pre></pre>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
